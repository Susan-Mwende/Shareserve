<!DOCTYPE html>
<html>
<head>
    <title>M-Pesa STK Push Test</title>
</head>
<body>
    <h1>M-Pesa STK Push Test</h1>
    <form id="stkPushForm">
        <div>
            <label>Phone Number:</label>
            <input type="text" id="phoneNumber" value="0712345678" required>
        </div>
        <div>
            <label>Amount:</label>
            <input type="number" id="amount" value="100" required>
        </div>
        <div>
            <label>Payment Type:</label>
            <select id="paymentType">
                <option value="paybill">Paybill</option>
                <option value="sendmoney">Send Money</option>
            </select>
        </div>
        <button type="submit">Send STK Push</button>
    </form>
    <div id="result"></div>

    <script>
        document.getElementById('stkPushForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                phoneNumber: document.getElementById('phoneNumber').value,
                amount: document.getElementById('amount').value,
                paymentType: document.getElementById('paymentType').value
            };
            
            try {
                const response = await fetch('http://localhost:5001/api/mpesa/stk-push', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>Response:</h3>
                    <pre>${JSON.stringify(result, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `
                    <h3>Error:</h3>
                    <pre>${error.message}</pre>
                `;
            }
        });
    </script>
</body>
</html>
