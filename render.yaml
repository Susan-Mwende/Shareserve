services:
  # Frontend Service
  - type: web
    name: shareserve-frontend
    env: node
    buildCommand: cd frontend && npm run build
    startCommand: cd frontend && npm run preview
    staticPublishPath: frontend/dist
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://shareserve.onrender.com

  # Backend Service  
  - type: web
    name: shareserve-backend
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGODB_URI
        value: ${MONGODB_URI}
      - key: JWT_SECRET
        value: ${JWT_SECRET}
      - key: CORS_ORIGIN
        value: https://shareserve.onrender.com
