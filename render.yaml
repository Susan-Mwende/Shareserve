services:
  # Backend Service
  - type: web
    name: shareserve-backend
    env: node
    rootDir: server          # ← Render cds into server/ before running commands
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGODB_URI
        value: ${MONGODB_URI}
      - key: JWT_SECRET
        value: ${JWT_SECRET}
      - key: CORS_ORIGIN
        value: https://shareserve-frontend.onrender.com

  # Frontend Service
  - type: web
    name: shareserve-frontend
    env: static              # ← use "static" for Vite-built React apps, not "node"
    rootDir: frontend        # ← Render cds into frontend/ before running commands
    buildCommand: npm install && npm run build
    staticPublishPath: dist  # ← relative to rootDir, so frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://shareserve-backend.onrender.com